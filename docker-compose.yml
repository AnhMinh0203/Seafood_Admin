version: '3.8'

services:
  api:
    build:
      context: ./src/Seafood.HttpApi.Host
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  angular:
    build:
      context: ./angular
      dockerfile: Dockerfile
    ports:
      - "4200:80"

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"