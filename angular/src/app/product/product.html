<!-- Management product table -->
<div class="card">
  <p-toast />
  <p-toolbar class="mb-6">
    <ng-template #start>
      <p-button label="Thêm" icon="pi pi-plus" size="small" class="me-1" (onClick)="addProduct()" />
      <p-button severity="danger" label="Xóa" size="small" icon="pi pi-trash" outlined (onClick)="deleteBatchProducts()"
        [disabled]="!selectedProducts || !selectedProducts.length" />
    </ng-template>

    <ng-template #end>
      <p-fileUpload mode="basic" accept="image/*" [maxFileSize]="1000000" label="Import" chooseLabel="Import" auto
        customUpload class="mr-2 inline-block" [chooseButtonProps]="{ severity: 'secondary',size: 'small' }" />
      <p-button label="Export" icon="pi pi-upload" class="ms-1" size="small" severity="secondary"
        (onClick)="exportCSV($event)" />
    </ng-template>
  </p-toolbar>

  <p-table #dt [value]="rows" [rows]="10" [columns]="cols" [paginator]="true" class="mt-1"
    [globalFilterFields]="['name', 'country.name', 'representative.name', 'status']"
    [tableStyle]="{ 'min-width': '75rem' }" [(selection)]="selectedProducts" [rowHover]="true" dataKey="id"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} entries" [showCurrentPageReport]="true">
    <ng-template #caption>
      <div class="d-flex align-items-center justify-content-between">
        <h5 class="m-0">Manage Products</h5>
        <p-iconfield>
          <p-inputicon class="pi pi-search" />
          <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')"
            placeholder="Search..." />
        </p-iconfield>
      </div>
    </ng-template>
    <ng-template #header>
      <tr>
        <th style="width: 3rem">
          <p-tableHeaderCheckbox />
        </th>
        <th pSortableColumn="name" style="min-width:16rem">
          <div class="flex items-center gap-2">
            Tên sản phẩm
            <p-sortIcon field="name" />
          </div>
        </th>
        <th class="text-center">Ảnh</th>
        <th pSortableColumn="price" style="min-width: 8rem" class="text-center">
          <div class="flex items-center gap-2">
            Giá
            <p-sortIcon field="price" />
          </div>
        </th>
        <th pSortableColumn="category" style="min-width:10rem" class="text-center">
          <div class="flex items-center gap-2">
            Loại
            <p-sortIcon field="category" />
          </div>
        </th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template #body let-product>
      <tr>
        <td style="width: 3rem">
          <p-tableCheckbox [value]="product" />
        </td>
        <td style="min-width: 16rem">{{ product.name }}</td>
        <td class="text-center">
          <img [src]="getImageUrl(product.coverImage)" [alt]="product.name" class="table-thumb-rect" />
        </td>
        <td class="text-center">{{ getDefaultPrice(product) | currency: 'USD' }}</td>
        <td class="text-center">{{ getCategoryName(product.categoryId) }}</td>
        <td>
          <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true"
            (click)="editProduct(product)" />
          <p-button icon="pi pi-trash" class="ms-2" severity="danger" [rounded]="true" [outlined]="true"
            (click)="deleteProduct(product)" />

          <p-button icon="pi pi-eye" class="ms-2" severity="info" [rounded]="true" [outlined]="true"
            (click)="viewProduct(product)" />
        </td>
      </tr>
    </ng-template>
  </p-table>
  <p-confirmdialog [style]="{ width: '450px' }" />
</div>

<!-- Product Form Template -->
<app-product-form [visible]="isFormVisible" [isEditMode]="isEditMode" (close)="closeForm()" (save)="onProductSaved()"
  [product]="newProduct"></app-product-form>

<!-- Product Preview Template -->
<app-product-preview [product]="selectedProduct" [isEditMode]="isPreViewMode"
  (close)="handlePreviewClose()"></app-product-preview>
