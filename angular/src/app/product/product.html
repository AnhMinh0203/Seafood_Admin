<div>
  <div class="d-flex justify-content-between w-100 align-items-center">
    <div class="w-25 my-2">
      <p-inputgroup>
        <input pInputText placeholder="Nhập thông tin cần tìm" (keyup)="updateFilter($event)" />
        <p-inputgroup-addon>
          <p-button [label]="this.selectedField" severity="secondary" variant="text" (click)="menu.toggle($event)" />
        </p-inputgroup-addon>
      </p-inputgroup>
      <p-menu #menu [model]="columnItems" popup appendTo="body" />
    </div>
    <div class="d-flex">
      <!-- <p-splitbutton label="Save" [model]="actionItems"  size="small" /> -->
      <p-button label="Delete" icon="pi pi-trash" iconPos="right" class="ms-1" size="small" />
      <p-button label="Add" icon="pi pi-plus" iconPos="right" class="ms-1" size="small" (click)="add()" />
      <p-button label="Import" icon="pi pi-arrow-down-left" iconPos="right" class="ms-1" size="small" />
      <p-button label="Export" icon="pi pi-arrow-up-right" iconPos="right" class="ms-1" size="small" />
    </div>

  </div>


  <div class=" p-0">
    <ngx-datatable
      #table class="material"
      [rows]="rows"
      [count]="totalCount"
      [limit]="pageSize"
      [offset]="pageIndex"

      [columnMode]="ColumnMode.force"
      [headerHeight]="50"
      [footerHeight]="50"
      rowHeight="auto"
      [selected]="selected"
      [selectionType]="SelectionType.checkbox"
      [messages]="messages"
      [externalPaging]="true"
      (activate)="onActivate($event)"
      (page)="onPage($event)"
    >

      <ngx-datatable-column
        [width]="30" [sortable]="false"
        [canAutoResize]="false"
        [draggable]="false"
        [resizeable]="false"
      >
        <ng-template ngx-datatable-header-template let-allRowsSelected="allRowsSelected" let-selectFn="selectFn">
          <input
            type="checkbox"
            [checked]="allRowsSelected"
            (change)="selectFn()"
          />
        </ng-template>

        <ng-template ngx-datatable-cell-template let-value="value" let-isSelected="isSelected"
          let-onCheckboxChangeFn="onCheckboxChangeFn">
          <input
            type="checkbox"
            [checked]="isSelected"
            (change)="onCheckboxChangeFn($event)"
          />
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column name="Tên sản phẩm" prop="name"></ngx-datatable-column>
      <ngx-datatable-column name="Giá">
        <ng-template ngx-datatable-cell-template let-row="row">
          {{ getDefaultUnit(row)?.price ? getDefaultUnit(row)?.price : 0 }} đ
        </ng-template>
      </ngx-datatable-column>


      <ngx-datatable-column name="Slug" prop="slug"></ngx-datatable-column>
      <ngx-datatable-column name="Số lượng" prop="stockQuantity">
          <ng-template ngx-datatable-cell-template let-row="row">
          {{ getDefaultUnit(row)?.stockQuantity }}

        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column name="Đơn vị">
        <ng-template ngx-datatable-cell-template let-row="row">
         {{ getDefaultUnit(row)?.unitName }}
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column
        name="Action"
        [width]="120"
        [sortable]="false"
        [canAutoResize]="false"
        [draggable]="false"
        [resizeable]="false"
      >

        <ng-template ngx-datatable-cell-template let-row="row">
          <div class="d-flex gap-1 justify-content-center">
            <p-button
              icon="pi pi-ellipsis-h"
              severity="secondary"
              size="small" (click)="openRowMenu($event, row)"
            ></p-button>
            <p-menu
              #rowMenu [popup]="true"
              [model]="rowActions"
              appendTo="body"
            ></p-menu>
          </div>
        </ng-template>
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<!-- Product Form Template -->
<app-product-form
  [visible]="isFormVisible"
  [isEditMode]="isEditMode"
  (close)="closeForm()"
  (save)="onSave($event)"
></app-product-form>
