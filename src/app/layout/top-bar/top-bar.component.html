<div class="top-bar">
  <button type="button" class="top-btn user-btn" (click)="openUserSidebar()">
    <i class="fa fa-user"></i>
  </button>

  <button type="button" class="top-btn cart-btn" routerLink="/cart">
    <i class="fa fa-shopping-cart"></i>

    @if (cartService.cartCount() > 0) {
      <span class="badge">{{ cartService.cartCount() }}</span>
    }
  </button>
</div>
