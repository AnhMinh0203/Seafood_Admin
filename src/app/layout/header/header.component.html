<div class="header-shell fixed-top">
  <div class="container-xxl p-0">
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4 px-lg-5">
      <a routerLink="/" class="navbar-brand brand-wrap">
        <i class="fa fa-utensils brand-icon"></i>
        <span class="brand-text">Restoran</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse"
        aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
        <span class="fa fa-bars"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav nav-center ms-auto">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
            class="nav-item nav-link">
            Trang chủ
          </a>

          <a routerLink="/about" routerLinkActive="active" class="nav-item nav-link">
            Giới thiệu
          </a>

          <a routerLink="/menu" routerLinkActive="active" class="nav-item nav-link">
            Thực đơn
          </a>

          <a routerLink="/contact" routerLinkActive="active" class="nav-item nav-link">
            Liên hệ
          </a>

          <a routerLink="/blog" routerLinkActive="active" class="nav-item nav-link">
            Tin tức
          </a>
        </div>

        <div class="header-actions">
          @if (!authService.isLoggedIn()) {
          <a routerLink="/login" class="login-link">Đăng nhập</a>
          <a routerLink="/register" class="register-btn">Đăng ký</a>
          } @else {
          <div class="user-menu" (click)="$event.stopPropagation()">
            <button type="button" class="user-trigger" (click)="toggleDropdown($event)">
              <div class="user-avatar">{{ userInitial }}</div>
            </button>

            @if (dropdownOpen) {
            <div class="user-dropdown">
              <div class="user-info">
                <div class="user-name">{{ displayName }}</div>
                <div class="user-phone">{{ authService.currentUser()?.phoneNumber }}</div>
              </div>

              <a routerLink="/profile" class="dropdown-item" (click)="closeDropdown()">
                <i class="fa-regular fa-user"></i>
                <span>Tài khoản của tôi</span>
              </a>

              <a routerLink="/order-history" class="dropdown-item" (click)="closeDropdown()">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>Lịch sử đặt hàng</span>
              </a>

              <a routerLink="/favorites" class="dropdown-item" (click)="closeDropdown()">
                <i class="fa-regular fa-heart"></i>
                <span>Yêu thích</span>
              </a>

              <a routerLink="/notifications" class="dropdown-item" (click)="closeDropdown()">
                <i class="fa-regular fa-bell"></i>
                <span>Thông báo</span>
              </a>

              <button type="button" class="dropdown-item logout-item" (click)="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Đăng xuất</span>
              </button>
            </div>
            }
          </div>
          }

          <a routerLink="/order" class="cart-btn" aria-label="Giỏ hàng">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge">{{ cartService.cartCount() }}</span>
          </a>
        </div>
      </div>
    </nav>
  </div>
</div>
