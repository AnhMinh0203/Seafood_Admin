<div class="pd-header-spacer"></div>

<section class="blog-detail-page">
  @if (blog) {
    <div class="blog-detail-container">
      <a class="back-link" routerLink="/blog">
        ← Back to blog
      </a>

      <div class="hero">
        <img [src]="blog.coverImage" [alt]="blog.title" class="hero-image" />
      </div>

      <div class="content-card">
        <div class="meta">
          <span>{{ blog.creatorName }}</span>
          <span class="dot">•</span>
          <span>{{ blog.creationTime | date:'dd/MM/yyyy HH:mm' }}</span>
          <span class="dot">•</span>
          <span>{{ blog.view }} views</span>
        </div>

        <h1 class="title">{{ blog.title }}</h1>

        <div class="content">
          <p>{{ blog.content }}</p>
        </div>
      </div>
    </div>
  } @else {
    <div class="not-found">
      <h2>Không tìm thấy bài viết</h2>
      <p>Bài viết bạn đang tìm có thể không tồn tại hoặc đã bị xóa.</p>
      <a routerLink="/blog" class="back-btn">Quay lại danh sách blog</a>
    </div>
  }
</section>
