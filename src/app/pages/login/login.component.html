<div class="auth-page">
  <div class="auth-container">
    <div class="auth-banner">
      <p class="auth-subtitle">Welcome back</p>
      <h1>Đăng nhập tài khoản</h1>
      <p class="auth-desc">
        Đăng nhập để theo dõi đơn hàng, quản lý giỏ hàng và trải nghiệm mua sắm thuận tiện hơn.
      </p>

      <div class="auth-highlight">
        <div class="highlight-item">
          <i class="fa-solid fa-cart-shopping"></i>
          <span>Quản lý đơn hàng nhanh chóng</span>
        </div>
        <div class="highlight-item">
          <i class="fa-solid fa-heart"></i>
          <span>Lưu món ăn yêu thích</span>
        </div>
        <div class="highlight-item">
          <i class="fa-solid fa-bell"></i>
          <span>Nhận ưu đãi mới nhất</span>
        </div>
      </div>
    </div>

    <div class="auth-card">
      <div class="card-header">
        <h2>Đăng nhập</h2>
        <p>Vui lòng nhập thông tin tài khoản của bạn</p>
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
        <div class="form-group">
          <label for="userNameOrPhoneNumber">Tên đăng nhập hoặc số điện thoại</label>
          <input
            id="userNameOrPhoneNumber"
            name="userNameOrPhoneNumber"
            type="text"
            [(ngModel)]="form.userNameOrPhoneNumber"
            required
            placeholder="Nhập tên đăng nhập hoặc số điện thoại"
            class="form-control"
          />
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <div class="password-wrap">
            <input
              id="password"
              name="password"
              [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="form.password"
              required
              minlength="4"
              placeholder="Nhập mật khẩu"
              class="form-control"
              
            />

            <button type="button" class="toggle-password" (click)="togglePassword()">
              <i class="fa-solid" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="rememberMe" [(ngModel)]="form.rememberMe" />
            <span>Ghi nhớ đăng nhập</span>
          </label>

          <a routerLink="/forgot-password" class="forgot-link">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="submit-btn" [disabled]="loading">
          {{ loading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
        </button>
      </form>

      <div class="auth-footer">
        <span>Chưa có tài khoản?</span>
        <a routerLink="/register">Đăng ký ngay</a>
      </div>
    </div>
  </div>
</div>
