<section class="profile-page mt-5">
  <div class="profile-container">
    <div class="profile-card">
      <div class="profile-card-header">
        <div class="avatar">
          <i class="fa-solid fa-user"></i>
        </div>

        <div class="profile-heading">
          <h2>Thông tin cá nhân</h2>
          <p>Cập nhật họ tên, số điện thoại và địa chỉ của bạn</p>
        </div>
      </div>

      <form class="profile-form" (ngSubmit)="saveProfile()">
        <div class="form-group">
          <label for="fullName">Họ và tên</label>
          <input
            id="fullName"
            name="fullName"
            type="text"
            [(ngModel)]="profile.fullName"
            placeholder="Nhập họ và tên"
          />
        </div>

        <div class="form-group">
          <label for="phoneNumber">Số điện thoại</label>
          <input
            id="phoneNumber"
            name="phoneNumber"
            type="text"
            [(ngModel)]="profile.phoneNumber"
            placeholder="Nhập số điện thoại"
          />
        </div>

        <div class="form-group">
          <label for="address">Địa chỉ</label>
          <textarea
            id="address"
            name="address"
            rows="4"
            [(ngModel)]="profile.address"
            placeholder="Nhập địa chỉ"
          ></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="save-btn">
            <i class="fa-solid fa-floppy-disk"></i>
            <span>Lưu thông tin</span>
          </button>

          <button type="button" class="clear-btn" (click)="clearProfile()">
            <i class="fa-solid fa-rotate-left"></i>
            <span>Xóa</span>
          </button>
        </div>

        @if (saveSuccess) {
          <div class="save-message">
            <i class="fa-solid fa-circle-check"></i>
            <span>Lưu thông tin thành công</span>
          </div>
        }
      </form>
    </div>
  </div>
</section>
