<div class="floating-contact">
  <a
    class="floating-btn call-btn"
    [href]="'tel:' + hotline"
    title="Gọi ngay"
  >
    <i class="fa-solid fa-phone"></i>
  </a>

  <a
    class="floating-btn zalo-btn"
    [href]="'https://zalo.me/' + zaloPhone"
    target="_blank"
    rel="noopener noreferrer"
    title="Liên hệ Zalo"
  >
    <span>Zalo</span>
  </a>
</div>
